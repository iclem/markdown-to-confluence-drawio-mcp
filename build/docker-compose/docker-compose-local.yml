services:
  dev:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: markdown-to-confluence-drawio-mcp-dev
    working_dir: /app
    command: bash
    environment:
      CONFLUENCE_BASE_URL: ${CONFLUENCE_BASE_URL:-}
      CONFLUENCE_EMAIL: ${CONFLUENCE_EMAIL:-}
      CONFLUENCE_API_TOKEN: ${CONFLUENCE_API_TOKEN:-}
      CONFLUENCE_BEARER_TOKEN: ${CONFLUENCE_BEARER_TOKEN:-}
      COPILOT_MCP_CONFLUENCE_URL: ${COPILOT_MCP_CONFLUENCE_URL:-}
      COPILOT_MCP_CONFLUENCE_USERNAME: ${COPILOT_MCP_CONFLUENCE_USERNAME:-}
      COPILOT_MCP_CONFLUENCE_API_TOKEN: ${COPILOT_MCP_CONFLUENCE_API_TOKEN:-}
    stdin_open: true
    tty: true
    volumes:
      - ../../:/app
      - markdown_to_confluence_drawio_mcp_m2:/root/.m2
      - markdown_to_confluence_drawio_mcp_npm:/root/.npm

  mcp:
    image: markdown-to-confluence-drawio-mcp-dev
    working_dir: /app
    command:
      - mcp
    environment:
      CONFLUENCE_BASE_URL: ${CONFLUENCE_BASE_URL:-}
      CONFLUENCE_EMAIL: ${CONFLUENCE_EMAIL:-}
      CONFLUENCE_API_TOKEN: ${CONFLUENCE_API_TOKEN:-}
      CONFLUENCE_BEARER_TOKEN: ${CONFLUENCE_BEARER_TOKEN:-}
      COPILOT_MCP_CONFLUENCE_URL: ${COPILOT_MCP_CONFLUENCE_URL:-}
      COPILOT_MCP_CONFLUENCE_USERNAME: ${COPILOT_MCP_CONFLUENCE_USERNAME:-}
      COPILOT_MCP_CONFLUENCE_API_TOKEN: ${COPILOT_MCP_CONFLUENCE_API_TOKEN:-}
    stdin_open: true
    tty: false
    volumes:
      - ../../:/app
      - markdown_to_confluence_drawio_mcp_m2:/root/.m2
      - markdown_to_confluence_drawio_mcp_npm:/root/.npm

  mcp-http:
    image: markdown-to-confluence-drawio-mcp-dev
    working_dir: /app
    command:
      - mcp-http
    environment:
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: ${MCP_PORT:-3000}
      CONFLUENCE_BASE_URL: ${CONFLUENCE_BASE_URL:-}
      CONFLUENCE_EMAIL: ${CONFLUENCE_EMAIL:-}
      CONFLUENCE_API_TOKEN: ${CONFLUENCE_API_TOKEN:-}
      CONFLUENCE_BEARER_TOKEN: ${CONFLUENCE_BEARER_TOKEN:-}
      COPILOT_MCP_CONFLUENCE_URL: ${COPILOT_MCP_CONFLUENCE_URL:-}
      COPILOT_MCP_CONFLUENCE_USERNAME: ${COPILOT_MCP_CONFLUENCE_USERNAME:-}
      COPILOT_MCP_CONFLUENCE_API_TOKEN: ${COPILOT_MCP_CONFLUENCE_API_TOKEN:-}
    ports:
      - "${MCP_PORT:-3000}:${MCP_PORT:-3000}"
    tty: false
    volumes:
      - ../../:/app
      - markdown_to_confluence_drawio_mcp_m2:/root/.m2
      - markdown_to_confluence_drawio_mcp_npm:/root/.npm

volumes:
  markdown_to_confluence_drawio_mcp_m2:
  markdown_to_confluence_drawio_mcp_npm:
